{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header bg-warning">
            <h3 class="mb-0">
                ✏ Edit Question
            </h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Question</label>

                    <textarea
                        name="question"
                        class="form-control"
                        rows="3"
                        required>{{ question[3] }}</textarea>
                </div>

                <div class="mb-3">
                    <label>Option 1</label>
                    <input
                        type="text"
                        name="option1"
                        class="form-control"
                        value="{{ question[4] }}"
                        required>
                </div>

                <div class="mb-3">
                    <label>Option 2</label>
                    <input
                        type="text"
                        name="option2"
                        class="form-control"
                        value="{{ question[5] }}"
                        required>
                </div>

                <div class="mb-3">
                    <label>Option 3</label>
                    <input
                        type="text"
                        name="option3"
                        class="form-control"
                        value="{{ question[6] }}"
                        required>
                </div>

                <div class="mb-3">
                    <label>Option 4</label>
                    <input
                        type="text"
                        name="option4"
                        class="form-control"
                        value="{{ question[7] }}"
                        required>
                </div>

                <div class="mb-3">
                    <label>Correct Option</label>
                    <input
                        type="text"
                        name="correct_option"
                        class="form-control"
                        value="{{ question[8] }}"
                        required>
                </div>

                <button class="btn btn-success">
                    💾 Update Question
                </button>

                <a href="/admin" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
