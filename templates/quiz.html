{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="text-center mb-3">
        📝 {{ topic_name }}
    </h2>

    <!-- Timer -->
    <div class="text-center mb-4">
        <h3 class="text-danger">
            ⏳ Time Left:
            <span id="timer">10:00</span>
        </h3>
    </div>

    <form action="/submit_quiz/{{ subject_id }}/{{ topic_id }}" method="POST">

        <!-- Question Palette -->
        <div class="card shadow mb-4">
            <div class="card-body text-center">

                <h5 class="mb-3">Question Palette</h5>

                {% for q in questions %}
                <button
                    type="button"
                    id="nav{{ loop.index }}"
                    class="btn btn-outline-secondary m-1"
                    onclick="document.getElementById('question{{ loop.index }}').scrollIntoView({behavior:'smooth'});">

                    {{ loop.index }}

                </button>
                {% endfor %}

            </div>
        </div>

        <!-- Questions -->
        {% for q in questions %}

        <div class="card shadow mb-4" id="question{{ loop.index }}">
            <div class="card-body">

                <h5 class="mb-3">
                    Q{{ loop.index }}. {{ q[3] }}
                </h5>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="q{{ q[0] }}"
                        value="{{ q[4] }}"
                        required
                        onclick="markAnswered({{ loop.index }})">

                    <label class="form-check-label">
                        {{ q[4] }}
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="q{{ q[0] }}"
                        value="{{ q[5] }}"
                        onclick="markAnswered({{ loop.index }})">

                    <label class="form-check-label">
                        {{ q[5] }}
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="q{{ q[0] }}"
                        value="{{ q[6] }}"
                        onclick="markAnswered({{ loop.index }})">

                    <label class="form-check-label">
                        {{ q[6] }}
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="q{{ q[0] }}"
                        value="{{ q[7] }}"
                        onclick="markAnswered({{ loop.index }})">

                    <label class="form-check-label">
                        {{ q[7] }}
                    </label>
                </div>

            </div>
        </div>

        {% endfor %}

        <div class="text-center mb-5">
            <button type="submit" class="btn btn-success btn-lg">
                ✅ Submit Quiz
            </button>
        </div>

    </form>

</div>

<script>

let totalSeconds = 60;

const timerDisplay = document.getElementById("timer");

const countdown = setInterval(function () {

    let minutes = Math.floor(totalSeconds / 60);
    let seconds = totalSeconds % 60;

    timerDisplay.innerHTML =
        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

    if (totalSeconds <= 60) {
        timerDisplay.style.color = "red";
        timerDisplay.style.fontWeight = "bold";
    }

    if (totalSeconds <= 0) {

        clearInterval(countdown);

        alert("⏰ Time is over! Quiz will be submitted automatically.");

        document.querySelector("form").submit();

    }

    totalSeconds--;

}, 1000);

function markAnswered(questionNo) {

    let btn = document.getElementById("nav" + questionNo);

    btn.classList.remove("btn-outline-secondary");

    btn.classList.add("btn-success");

}

</script>

{% endblock %}
