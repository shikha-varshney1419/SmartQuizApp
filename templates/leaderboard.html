{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="text-center text-primary fw-bold mb-4">
        🏆 Top Performers
    </h2>

    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-body">

            <table class="table table-hover text-center align-middle mb-0">

                <thead class="table-primary">
                    <tr>
                        <th>🏅 Rank</th>
                        <th>👤 Student</th>
                        <th>📈 Best Score</th>
                    </tr>
                </thead>

                <tbody>

                {% for i in range(leaders|length) %}

                <tr>

                    <td>

                        {% if i==0 %}
                            🥇
                        {% elif i==1 %}
                            🥈
                        {% elif i==2 %}
                            🥉
                        {% else %}
                            {{ i+1 }}
                        {% endif %}

                    </td>

                    <td class="fw-bold">
                        {{ leaders[i][0] }}
                    </td>

                    <td>

                        <span class="badge bg-success fs-6 px-3 py-2">

                            {{ leaders[i][1] }} %

                        </span>

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
