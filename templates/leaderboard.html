{% extends "base.html" %}

{% block content %}

<h2 class="text-center mb-4">🏆 Leaderboard</h2>

<div class="container">

    <table class="table table-striped table-hover text-center shadow">

        <thead class="table-dark">
            <tr>
                <th>Rank</th>
                <th>Student Name</th>
                <th>Best Score (%)</th>
            </tr>
        </thead>

        <tbody>

        {% for i in range(leaders|length) %}
        <tr>
            <td>{{ i + 1 }}</td>
            <td>{{ leaders[i][0] }}</td>
            <td>{{ leaders[i][1] }}%</td>
        </tr>
        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
